# AE Seller Discovery Tool

## CRITICAL: No external dependencies. No CDN links. No Google Fonts. No Font Awesome. Use only inline HTML/CSS/JS. Use unicode emoji characters instead of icon fonts.

## Overview
A discovery questionnaire dashboard for Account Executives (AEs) selling Square POS to new restaurant/business sellers. The tool ensures all required information is captured during discovery calls. Includes Salesforce sync simulation and Slack notification automation for Onboarding Specialists when info is missed.

## Design
- Left sidebar (260px, dark navy #1B2559 background) with section navigation and completion tracking — fixed position, scrolls independently
- Top bar (56px) with opportunity name, AE name, date, Save/Sync buttons — fixed at top
- Main content area (white background, scrollable with bottom padding) showing the active section
- Clean, modern SaaS look. Use system fonts: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif
- Use emoji for icons: 🏢 📋 ⚠️ 🛠️ 🧰 💻 🔧 👥 📅 📝 ✅ 🔴 🟡 🟢 ☁️

## Sidebar
- App title "🔍 Discovery Tool" at top
- Overall completion percentage with a progress bar (green fill on dark background)
- Navigation items for each section, showing section number, name, and completion badge (🟢 100%, 🟡 partial, 🔴 0%)
- Bottom: Salesforce status indicator "☁️ Salesforce Connected" and buttons: "Sync to Salesforce", "Submit for Onboarding"

## Top Bar
- Left: Opportunity name (auto-generated from business name + locations)
- Center: AE Name input, Date input
- Right: "💾 Save Draft" button, "📄 Load Example" button (ORANGE/AMBER color, prominent with shadow), "🆕 New" button

## Section Navigation
- Each section has Previous/Next navigation buttons at the bottom
- Previous button styled as subtle gray button with hover effect, shows previous section icon and name
- Next button (primary blue) shows next section icon and name
- Center shows "Section X of 9" indicator
- First section hides Previous button (shows empty placeholder for alignment)
- Last section shows "Submit for Onboarding" instead of Next
- Next button triggers validation of required fields before navigating (highlights empty required fields with red border shake animation)
- Clicking Previous/Next scrolls content to top

## Field Validation
- Required fields marked with red asterisk *
- When navigating forward via Next button, empty required fields get red border with shake animation
- Validation is non-blocking (shows warning toast but still navigates after brief delay)
- Red border animation lasts 2 seconds then clears

## Dynamic Location Sync
- When "Number of Locations" field changes, location detail groups are dynamically added/removed to match the count
- Adding a location via the "+ Add Location" button also updates the Number of Locations field
- Removing a location also updates the Number of Locations field
- Location details include: Location Name, Address, City, State (dropdown of all US states + DC), Zip
- Hardware section auto-populates location groups from Business Overview locations

## Section Title Styling
- Section titles are 20px bold with emoji prefix
- Bottom border separator (2px solid gray-200) to clearly delineate from form content below

## Sections (9 total, each is a card-based form)

### Section 1: 🏢 Business Overview
Fields:
- Business Name (text, REQUIRED, placeholder: "e.g. Triple Crossing Brewing")
- Number of Locations (number, REQUIRED) — dynamically syncs location detail groups
- Location Details (repeatable group with + Add Location button): Location Name, Address, City, State (US state dropdown), Zip
- Business Type (select: Restaurant, Brewery, Bar, Cafe, Retail, Food Truck, Other)
- Business Offering (textarea, placeholder: "e.g. Brewery and restaurant")
- Years in Business (number)
- Estimated Annual Revenue (select: Under $500K, $500K-$1M, $1M-$5M, $5M-$10M, $10M+)
- Number of Employees (number)

### Section 2: ⚠️ Goals & Pain Points
Fields:
- Current POS Pain Points (textarea, REQUIRED, placeholder: "What issues are they experiencing?")
- Previous Square Experience? (toggle yes/no, if yes show textarea for details)
- Operational Inefficiencies (textarea, REQUIRED, placeholder: "Manual processes, redundant tools to eliminate?")
- Apps/Tools to Consolidate (repeatable: App Name + What It's Used For, with + Add button)
- Primary Reasons for Switching (checkboxes: Cost Savings, Better Features, Consolidation, Support Issues, Contract Issues, Growth Needs, Other)
- Key Decision Maker (text inputs: Name, Role, Email, Phone)
- Key Stakeholder / Day-to-Day User (text inputs: Name, Role)
- Broader Business Goals (textarea)

### Section 3: 🛠️ Migration Requirements
Fields:
- Must-Have Features (checklist with toggles, each with optional notes textarea):
  Kitchen ticket routing/KDS, Table service, Multiple job roles/pay rates, Tip management, Pre-auth for cards, Online ordering, Loyalty program, Gift cards, Multi-location mgmt, Inventory management, Employee scheduling, Time clock, Reporting/analytics, Other
- Nice-to-Have Features (same checklist format)
- Critical Migration Concerns (textarea, placeholder: "Biggest fears about switching?")
- Acceptable Disruption Level (select: None, Minimal, Some, Flexible)
- Staff Training Requirements (textarea)

### Section 4: 🧰 Current POS & Tools
Fields:
- Current POS System (select: Toast, Clover, Aloha, Micros, Lightspeed, Revel, TouchBistro, Other + text, REQUIRED)
- Contract Status (select: Month-to-month, Under contract, Ending soon, Cancelled)
- Contract End Date (date)
- Early Termination Fee (text)
- Additional Tools (repeatable: Tool Name, Purpose, Monthly Cost)
- Current Checkout Flow (textarea)
- Kitchen Display Setup (checkboxes: KDS Screens, Printed Tickets, Expo Station, None)
- Kitchen Workflow Details (textarea)

### Section 5: 💻 Technical Details
Fields:
- Square Product (checkboxes: Square for Restaurants, Square for Retail, Square POS, Square Online)
- SaaS Tier (select: Free, Plus $60/mo, Premium $149/mo, Custom)
- Add-On Services (checkboxes: Payroll, Marketing, Loyalty, Online, Team Management)
- Processing Rate (text)
- Monthly Software Cost (text)
- Custom Pricing/Discounts (textarea)

### Section 6: 🔧 Hardware & Networking
Fields:
- Networking Assistance Needed (select: Yes, No, TBD - Site Survey Required, REQUIRED)
- Existing Cabling Reusable? (select: Yes, No, Unknown)
- Cabling Notes (textarea)
- Site Survey Scheduled? (toggle, if yes show date picker)
- Site Survey Notes (textarea)
- Hardware Per Location (repeatable per location, auto-populated from Business Overview locations)
- Hardware Summary (auto-calculated, read-only display showing totals)

### Section 7: 👥 Staffing & Configuration
Fields:
- Staff Roles (repeatable: Role Name, Pay Rate, Tip Eligible toggle)
- Tip Distribution Method (select: Individual, Pooled by hours, Weighted percentage, Custom)
- Tip Pool Details (textarea)
- Employees Per Location (repeatable: Location, Count)
- Scheduling Needs (textarea)
- Time Clock Requirements (textarea)

### Section 8: 📅 Timeline & Planning
Fields:
- Go-Live Target Date (date, REQUIRED)
- Menu Build Start Date (date)
- Dashboard Training Start Date (date)
- Blackout Dates (repeatable: Start Date, End Date, Reason)
- Installation Window Start/End (dates)
- Installation Notes (textarea)
- Preferred Install Days (checkboxes: Mon-Sun)
- Install/Training Days Needed (number)
- AE Available On-Site? (toggle, if yes show notes textarea)
- Timeline Constraints (textarea)
- GSO Special Instructions (textarea with yellow background)

### Section 9: 📝 Notes & Special Instructions
Fields:
- Internal AE Notes (textarea, large)
- ⚠️ Attention Items for GSO (textarea with red-tinted background, REQUIRED)
- Competitive Intelligence (textarea)
- Risk Factors (textarea)
- Follow-Up Items (repeatable: Item, Owner, Due Date, Status select)

## Key Features

### Completion Tracking
- Each section calculates completion % based on filled required + optional fields
- Sidebar shows per-section completion with color badges
- Overall % shown prominently at top of sidebar
- Required fields marked with red asterisk *
- Completion updates correctly when example data is loaded

### Auto-Save
- Save to localStorage every 30 seconds
- "Last saved" timestamp shown near save button
- Load from localStorage on page load

### Load Example Button (PROMINENT - Orange/Amber)
- Styled with orange/amber background (#F59E0B), white text, bold font, and subtle shadow
- Pre-fills ALL sections comprehensively with Triple Crossing Brewing data

### Salesforce Sync (Simulated)
- "Sync to Salesforce" button shows a modal with field mapping preview table
- Simulates sync with loading spinner then success toast
- Shows "Last synced: [time]" in sidebar

### Slack Notification Automation (Styled as realistic message card)
- "Submit for Onboarding" button validates all required fields
- Slack preview styled as realistic message card with left border accent:
  - RED left border (4px) for incomplete discoveries
  - GREEN left border (4px) for complete discoveries
  - White card background with clean typography
  - Bold section headers with divider lines
  - Missing fields grouped by section with red highlighting
  - GSO Instructions in yellow warning box
  - Attention Items in red alert box
  - Complete summary includes: Business Overview, Key Contacts, Technical Setup, Hardware & Networking, Timeline, GSO Instructions, Attention Items
- "Send to #onboarding-handoffs" button (simulated, shows success toast)
- "Copy to Clipboard" button with fallback for clipboard API

### New Discovery
- Clears all data and localStorage, resets form

## Scrolling Behavior
- Main content area scrolls independently while sidebar stays fixed
- Content has 80px bottom padding so last fields aren't cut off
- Section navigation (Previous/Next) scrolls content to top when switching sections

## Visual Style Details
- Cards: white background, 1px solid #E5E7EB border, 8px border-radius, subtle shadow
- Required field labels have red * after them
- Input fields: 40px height, #F9FAFB background, 1px #E5E7EB border, 6px radius, focus: blue border
- Field validation error: red border with 3px red shadow, shake animation (0.4s)
- Textareas: same style, min-height 80px
- Buttons: Primary (blue #006AFF), Secondary (white, gray border), Subtle (transparent bg, gray-300 border, gray-500 text, hover to gray-100), Danger (red), Orange (#F59E0B with shadow)
- Toggle switches: 44px wide, 24px tall, blue when on
- Repeatable groups: light gray background card with fields inside, red X remove button, blue + Add button below
- Section nav footer: flex layout with Previous (subtle style) / Next (primary blue) buttons and section counter
- Toast notifications: fixed bottom-right, slide in, auto-dismiss after 3 seconds
- Modal: centered, white, max-width 640px, dark overlay, with close X button
- Slack preview: white card with colored left border accent (4px), clean typography, section headers with borders

<script>
// ===== INTEGRATION CONFIG =====
// Persisted in localStorage. Configure via ⚙️ Settings panel.
var CONFIG = {
  // --- SLACK ---
  // Option A: Slack Bot Token (recommended — works from browser)
  //   1. Go to https://api.slack.com/apps → Create New App
  //   2. Add Bot Token Scopes: chat:write, chat:write.public
  //   3. Install to workspace → copy Bot User OAuth Token (xoxb-...)
  SLACK_BOT_TOKEN: '',
  SLACK_CHANNEL: '#onboarding-handoffs',  // channel name or ID
  // Option B: Webhook URL (requires proxy server — CORS blocked from browser)
  SLACK_WEBHOOK_URL: '',

  // --- SALESFORCE ---
  // Uses OAuth 2.0 User-Agent Flow (no server needed)
  //   1. Salesforce Setup → App Manager → New Connected App
  //   2. Enable OAuth → Add scopes: api, refresh_token, full
  //   3. Set Callback URL to this page's URL
  //   4. Under "Require Secret for Web Server Flow" → UNCHECK
  //   5. Copy Consumer Key (Client ID)
  SF_CLIENT_ID: '',
  SF_LOGIN_URL: 'https://login.salesforce.com',
  SF_INSTANCE_URL: '',
  SF_ACCESS_TOKEN: '',

  // --- API PROXY (optional, for webhook mode) ---
  // If you deploy the Cloud Function proxy, set its URL here
  API_PROXY_URL: '',

  // --- Feature flags ---
  SLACK_ENABLED: false,
  SF_ENABLED: false
};

function loadConfig(){
  try {
    var saved = localStorage.getItem('ae_discovery_config');
    if(saved){
      var parsed = JSON.parse(saved);
      Object.keys(parsed).forEach(function(k){ if(k in CONFIG) CONFIG[k] = parsed[k]; });
    }
  } catch(e){}

  // Check URL hash for Salesforce OAuth callback (User-Agent flow returns token in hash)
  var hash = window.location.hash;
  if(hash && hash.indexOf('access_token') > -1){
    var params = new URLSearchParams(hash.substring(1));
    var token = params.get('access_token');
    var instanceUrl = params.get('instance_url');
    if(token){
      CONFIG.SF_ACCESS_TOKEN = token;
      CONFIG.SF_INSTANCE_URL = decodeURIComponent(instanceUrl || '');
      CONFIG.SF_ENABLED = true;
      saveConfig();
      window.history.replaceState({}, document.title, window.location.pathname);
      setTimeout(function(){ showToast('✅ Salesforce connected successfully!','success'); updateSFStatus(); }, 500);
    }
  }

  // Also check for error in hash
  if(hash && hash.indexOf('error=') > -1){
    var errParams = new URLSearchParams(hash.substring(1));
    var errDesc = errParams.get('error_description') || errParams.get('error') || 'Unknown error';
    window.history.replaceState({}, document.title, window.location.pathname);
    setTimeout(function(){ showToast('❌ Salesforce auth failed: ' + decodeURIComponent(errDesc),'error'); }, 500);
  }
}

function saveConfig(){
  try { localStorage.setItem('ae_discovery_config', JSON.stringify(CONFIG)); } catch(e){}
}

function renderSectionNav(idx){

function navigateNext(currentIdx){
  collectAllFields();
  var reqFields=REQUIRED_FIELDS[currentIdx];
  var hasErrors=false;
  if(reqFields){
    reqFields.forEach(function(rf){
      var v=getNestedValue(data,rf.path);
      if(!v||v===''){
        hasErrors=true;
        highlightRequiredField(rf.path);
      }
    });
  }
  if(hasErrors){
    showToast('⚠️ Some required fields are empty','error');
    setTimeout(function(){goToSection(currentIdx+1);},1500);
  } else {
    goToSection(currentIdx+1);
  }
}

function highlightRequiredField(fieldPath){
  var el=document.querySelector('[data-field="'+fieldPath+'"]');
  if(el){
    el.classList.add('field-error');
    el.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(function(){el.classList.remove('field-error');},2000);
  }
}

    case 5:return renderHardware();

    case 7:return renderTimeline();

  }
}

function fg(label,type,field,value,opts){
  opts=opts||{};
  var req=opts.required?'<span class="req">*</span>':'';
  var cls=opts.full?'form-group full':(opts.half?'form-group half':'form-group');
  var ph=opts.placeholder||'';
  var extraCls=opts.cls||'';
  if(type==='textarea'){
    return'<div class="'+cls+'"><label>'+label+req+'</label><textarea data-field="'+field+'" placeholder="'+esc(ph)+'" class="'+extraCls+'">'+esc(value||'')+'</textarea></div>';
  }
  if(type==='select'){
    var options=(opts.options||[]).map(function(o){return'<option value="'+esc(o)+'"'+(value===o?' selected':'')+'>'+esc(o)+'</option>';}).join('');
    return'<div class="'+cls+'"><label>'+label+req+'</label><select data-field="'+field+'"><option value="">Select...</option>'+options+'</select></div>';
  }
  return'<div class="'+cls+'"><label>'+label+req+'</label><input type="'+type+'" data-field="'+field+'" value="'+esc(value||'')+'" placeholder="'+esc(ph)+'"></div>';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// DATA BINDING
function bindEvents(){
  document.querySelectorAll('[data-field]').forEach(function(el){
    var ev=(el.tagName==='SELECT'||el.type==='date')?'change':'input';
    el.addEventListener(ev,function(){
      setNestedValue(data,el.dataset.field,el.value);
      onDataChange(el.dataset.field);
    });
  });
  document.querySelectorAll('[data-toggle]').forEach(function(el){
    el.addEventListener('click',function(){
      var path=el.dataset.toggle;
      var cur=getNestedValue(data,path);
      setNestedValue(data,path,!cur);
      refreshAll();
    });
  });
  document.querySelectorAll('[data-cb]').forEach(function(el){
    el.addEventListener('click',function(){
      var path=el.dataset.cb;
      var val=el.dataset.val;
      var arr=getNestedValue(data,path)||[];
      var idx=arr.indexOf(val);
      if(idx>=0)arr.splice(idx,1);else arr.push(val);
      setNestedValue(data,path,arr);
      refreshAll();
    });
  });
}

function setNestedValue(obj,path,val){
  var parts=path.split('.');
  var cur=obj;
  for(var i=0;i<parts.length-1;i++){
    var p=parts[i];
    var nextP=parts[i+1];
    if(!isNaN(nextP)){
      if(!Array.isArray(cur[p]))cur[p]=[];
      cur=cur[p];
    } else {
      if(typeof cur[p]!=='object'||cur[p]===null)cur[p]={};
      cur=cur[p];
    }
  }
  cur[parts[parts.length-1]]=val;
}

function getNestedValue(obj,path){
  var parts=path.split('.');
  var cur=obj;
  for(var i=0;i<parts.length;i++){
    if(cur==null)return undefined;
    cur=cur[parts[i]];
  }
  return cur;
}

function onDataChange(field){
  if(field==='business.locations'){
    syncLocationDetailsToCount();
    refreshAll();
    return;
  }
  if(field&&(field.indexOf('business.name')===0||field.indexOf('business.locationDetails')>=0)){
    updateOppName();
  }
  renderSidebar();
}

function syncLocationDetailsToCount(){
  var count=parseInt(data.business.locations)||1;
  if(count<1)count=1;
  if(count>20)count=20;
  var details=data.business.locationDetails;
  while(details.length<count){
    details.push({name:'',address:'',city:'',state:'',zip:''});
  }
  while(details.length>count){
    details.pop();
  }
}

// SECTION COMPLETION
function getSectionCompletion(idx){
  switch(idx){
    case 0:return calcCompletion(['business.name','business.locations'],['business.type','business.offering','business.years','business.revenue','business.employees']);
    case 1:return calcCompletion(['goals.painPoints','goals.inefficiencies'],['goals.broaderGoals','goals.decisionMaker.name','goals.decisionMaker.role','goals.stakeholder.name','goals.stakeholder.role']);
    case 2:return calcCompletion([],['migration.concerns','migration.disruption','migration.training']);
    case 3:return calcCompletion(['current.pos'],['current.contractStatus','current.checkoutFlow','current.kitchenWorkflow','current.termFee']);
    case 4:return calcCompletion([],['technical.tier','technical.rate','technical.monthlyCost','technical.customPricing']);
    case 5:return calcCompletion(['hardware.networking'],['hardware.cablingReusable','hardware.cablingNotes','hardware.siteSurveyNotes']);
    case 6:return calcCompletion([],['staffing.tipMethod','staffing.tipDetails','staffing.scheduling','staffing.timeClock']);
    case 7:return calcCompletion(['timeline.goLive'],['timeline.menuBuild','timeline.installStart','timeline.installEnd','timeline.installDaysNeeded','timeline.gsoInstructions','timeline.constraints']);
    case 8:return calcCompletion(['notes.attentionGSO'],['notes.internal','notes.competitive','notes.risk']);
  }
  return 0;
}

function calcCompletion(required,optional){
  var all=required.concat(optional);
  if(all.length===0)return 100;
  var filled=0;
  all.forEach(function(f){
    var v=getNestedValue(data,f);
    if(v!==undefined&&v!==null&&v!==''){
      if(Array.isArray(v)){
        if(v.length>0)filled++;
      } else {
        filled++;
      }
    }
  });
  return Math.round((filled/all.length)*100);
}

}

// HARDWARE SYNC
function syncHardwareLocations(){
  var locs=data.business.locationDetails||[];
  var hwLocs=data.hardware.locations;
  while(hwLocs.length<locs.length){
    hwLocs.push({name:'',terminals:'',handhelds:'',kds:'',printersStationary:'',printersFloating:'',kitchenPrinters:'',cashDrawers:'',stands:'',standNotes:'',printerNotes:''});
  }
  while(hwLocs.length>locs.length&&hwLocs.length>1)hwLocs.pop();
  if(locs.length===0&&hwLocs.length>0){hwLocs.length=0;}
  locs.forEach(function(l,i){hwLocs[i].name=l.name||('Location '+(i+1));});
}

function calcHardwareTotals(){
  var t={Terminals:0,Handhelds:0,'KDS Displays':0,'Printers (Stat.)':0,'Printers (Float.)':0,'Kitchen Printers':0,'Cash Drawers':0,'Stands/Mounts':0};
  (data.hardware.locations||[]).forEach(function(l){
    t.Terminals+=parseInt(l.terminals)||0;
    t.Handhelds+=parseInt(l.handhelds)||0;
    t['KDS Displays']+=parseInt(l.kds)||0;
    t['Printers (Stat.)']+=parseInt(l.printersStationary)||0;
    t['Printers (Float.)']+=parseInt(l.printersFloating)||0;
    t['Kitchen Printers']+=parseInt(l.kitchenPrinters)||0;
    t['Cash Drawers']+=parseInt(l.cashDrawers)||0;
    t['Stands/Mounts']+=parseInt(l.stands)||0;
  });
  return t;
}

function loadFromStorage(){
  try{
    var s=localStorage.getItem('ae-discovery-data');
    if(s){
      var loaded=JSON.parse(s);
      data=mergeDeep(getDefaultData(),loaded);
      document.getElementById('aeName').value=data.aeName||'';
      document.getElementById('aeDate').value=data.aeDate||'';
    }
  }catch(e){}
}

function mergeDeep(target,source){
  if(!source)return target;
  for(var key in source){
    if(source.hasOwnProperty(key)){
      if(source[key]&&typeof source[key]==='object'&&!Array.isArray(source[key])){
        if(!target[key])target[key]={};
        mergeDeep(target[key],source[key]);
      } else {
        target[key]=source[key];
      }
    }
  }
  return target;
}

// ===== SALESFORCE INTEGRATION =====

function sfIsConnected(){
  return CONFIG.SF_ENABLED && CONFIG.SF_ACCESS_TOKEN && CONFIG.SF_INSTANCE_URL;
}

function sfConnect(){
  if(!CONFIG.SF_CLIENT_ID){
    showToast('⚙️ Configure Salesforce Client ID in Settings first','error');
    openSettings();
    return;
  }
  // OAuth 2.0 User-Agent Flow (no server/secret needed)
  // Returns access_token directly in URL hash fragment
  var redirectUri = window.location.origin + window.location.pathname;
  var authUrl = CONFIG.SF_LOGIN_URL + '/services/oauth2/authorize'
    + '?response_type=token'
    + '&client_id=' + encodeURIComponent(CONFIG.SF_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(redirectUri)
    + '&scope=' + encodeURIComponent('api full')
    + '&display=popup'
    + '&prompt=login consent';
  window.location.href = authUrl;
}

function sfDisconnect(){
  CONFIG.SF_ACCESS_TOKEN = '';
  CONFIG.SF_INSTANCE_URL = '';
  CONFIG.SF_ENABLED = false;
  saveConfig();
  updateSFStatus();
  showToast('Salesforce disconnected','info');
}

function sfApiCall(method, path, payload){
  if(!sfIsConnected()){
    return Promise.reject(new Error('Not connected to Salesforce'));
  }
  if(!CONFIG.API_PROXY_URL){
    return Promise.reject(new Error('API Proxy URL required for Salesforce calls. Configure in ⚙️ Settings.'));
  }

  return fetch(CONFIG.API_PROXY_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      action: 'sf_api',
      instance_url: CONFIG.SF_INSTANCE_URL,
      access_token: CONFIG.SF_ACCESS_TOKEN,
      method: method,
      endpoint: path,
      body: payload || null
    })
  }).then(function(resp){ return resp.json(); })
  .then(function(json){
    if(json.ok) return json.data;
    if(json.needs_refresh){
      CONFIG.SF_ACCESS_TOKEN = '';
      CONFIG.SF_ENABLED = false;
      saveConfig();
      updateSFStatus();
      throw new Error('Session expired — please reconnect Salesforce in ⚙️ Settings');
    }
    throw new Error(json.error || 'Salesforce API error');
  });
}

function doSyncSF(){
  var body=document.getElementById('modalBody');
  var footer=document.getElementById('modalFooter');
  body.innerHTML='<div style="text-align:center;padding:40px"><div class="spinner" style="border-color:rgba(0,106,255,.2);border-top-color:var(--blue);width:40px;height:40px;margin:0 auto 16px"></div><div style="color:var(--gray-500)">Syncing to Salesforce...</div></div>';
  footer.innerHTML='';

  if(sfIsConnected()){
    // REAL Salesforce API call — create or update Account
    var accountPayload = {
      Name: data.business.name || 'Unknown Business',
      Type: data.business.type || '',
      AnnualRevenue: data.business.revenue || '',
      Description: 'Discovery completed by ' + (data.aeName||'AE') + ' on ' + (data.aeDate||'N/A') + '.\n\nPain Points: ' + (data.goals.painPoints||'') + '\n\nGSO Instructions: ' + (data.timeline.gsoInstructions||'')
    };

    // Search for existing account first
    var query = "SELECT Id FROM Account WHERE Name = '" + (data.business.name||'').replace(/'/g,"\\'") + "' LIMIT 1";
    sfApiCall('GET', '/services/data/v59.0/query/?q=' + encodeURIComponent(query))
    .then(function(result){
      if(result.records && result.records.length > 0){
        // Update existing
        var accountId = result.records[0].Id;
        return sfApiCall('PATCH', '/services/data/v59.0/sobjects/Account/' + accountId, accountPayload)
          .then(function(){ return {id: accountId, action: 'updated'}; });
      } else {
        // Create new
        return sfApiCall('POST', '/services/data/v59.0/sobjects/Account', accountPayload)
          .then(function(r){ return {id: r.id, action: 'created'}; });
      }
    })
    .then(function(result){
      closeModal();
      var now=new Date().toLocaleTimeString();
      document.getElementById('sfLastSync').textContent='Last synced: '+now;
      updateSFStatus();
      showToast('✅ Account '+result.action+' in Salesforce ('+result.id+')','success');
    })
    .catch(function(err){
      body.innerHTML='<div style="color:var(--red);padding:20px;text-align:center"><strong>❌ Salesforce Sync Failed</strong><br><br>'+esc(err.message)+'<br><br><span style="font-size:12px;color:var(--gray-500)">Check your credentials in Settings (⚙️) or try reconnecting.</span></div>';
      footer.innerHTML='<button class="btn" onclick="closeModal()">Close</button><button class="btn" onclick="sfConnect()">🔗 Reconnect</button>';
    });
  } else {
    // Demo mode — simulate sync
    setTimeout(function(){
      closeModal();
      var now=new Date().toLocaleTimeString();
      document.getElementById('sfLastSync').textContent='Last synced: '+now+' (demo)';
      showToast('✅ Demo sync complete — connect Salesforce in ⚙️ for real sync','info');
    },1500);
  }
}

function updateSFStatus(){
  var dot = document.querySelector('.sf-dot');
  var label = document.querySelector('.sf-label');
  if(dot && label){
    if(sfIsConnected()){
      dot.style.background='var(--green)';
      label.textContent='Salesforce Connected';
    } else if(CONFIG.SF_CLIENT_ID){
      dot.style.background='var(--yellow)';
      label.textContent='Salesforce Configured (not connected)';
    } else {
      dot.style.background='var(--gray-400)';
      label.textContent='Salesforce Not Configured';
    }
  }
}

function testProxy(){

  if(!proxyUrl){ showToast('❌ Enter a proxy URL first','error'); return; }
  fetch(proxyUrl, {

    body: JSON.stringify({action: 'health'})
  }).then(function(resp){ return resp.json(); })
  .then(function(json){
    if(json.ok) showToast('✅ Proxy is working!','success');
    else showToast('❌ Proxy responded but returned error: '+(json.error||'unknown'),'error');

// ===== PROXY HELPER =====
// All external API calls go through the Google Apps Script proxy to avoid CORS
function proxyFetch(payload){
  var proxyUrl = CONFIG.API_PROXY_URL;
  if(!proxyUrl){
    return Promise.reject(new Error('No proxy URL configured. Go to ⚙️ Settings → Advanced → API Proxy URL'));
  }
  return fetch(proxyUrl, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(resp){
    // Google Apps Script always returns 200 with redirects, so parse JSON
    return resp.json();
  });
}

function testSlack(){
  var botToken = document.getElementById('cfgSlackBot').value.trim();
  var channel = document.getElementById('cfgSlackChannel').value.trim() || '#onboarding-handoffs';
  var webhookEl = document.getElementById('cfgSlackWebhook');
  var webhook = webhookEl ? webhookEl.value.trim() : '';
  var proxyUrl = (document.getElementById('cfgProxyUrl')||{}).value || CONFIG.API_PROXY_URL;

  if(!proxyUrl){
    showToast('❌ Set the API Proxy URL first (see Advanced section below)','error');
    return;
  }

  if(botToken){
    var testMsg = '🧪 *Test from AE Discovery Tool*\nIf you see this, the Slack integration is working! ✅\n_Sent at '+new Date().toLocaleString()+'_';
    fetch(proxyUrl, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'slack_bot',
        token: botToken,
        channel: channel,
        text: testMsg
      })
    }).then(function(resp){ return resp.json(); })
    .then(function(json){
      if(json.ok){
        showToast('✅ Test message sent to '+channel+'!','success');
      } else {
        var err = json.error || 'Unknown error';
        var hint = '';
        if(err==='not_in_channel') hint = ' — invite the bot to the channel first';
        if(err==='channel_not_found') hint = ' — use channel ID (C...) or add chat:write.public scope';
        if(err==='invalid_auth') hint = ' — check your bot token';
        showToast('❌ Slack error: '+err+hint,'error');
      }
    }).catch(function(err){
      showToast('❌ Proxy error: '+err.message,'error');
    });
  } else if(webhook){
    fetch(proxyUrl, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'slack_webhook',
        webhook_url: webhook,
        payload: { text: '🧪 *Test from AE Discovery Tool*\nSlack integration working! ✅' }
      })
    }).then(function(resp){ return resp.json(); })
    .then(function(json){
      if(json.ok) showToast('✅ Test message sent!','success');
      else showToast('❌ Slack error: '+(json.error||json.response||'Unknown'),'error');
    }).catch(function(err){
      showToast('❌ Proxy error: '+err.message,'error');
    });
  } else {
    showToast('❌ Enter a Bot Token or Webhook URL first','error');
  }
}

function getMissingRequired(){
  var missing=[];
  if(!data.business.name)missing.push({section:'🏢 Business Overview',field:'Business Name'});
  if(!data.business.locations)missing.push({section:'🏢 Business Overview',field:'Number of Locations'});
  if(!data.goals.painPoints)missing.push({section:'\u26A0\uFE0F Goals & Pain Points',field:'Current POS Pain Points'});
  if(!data.goals.inefficiencies)missing.push({section:'\u26A0\uFE0F Goals & Pain Points',field:'Operational Inefficiencies'});
  if(!data.current.pos)missing.push({section:'🧰 Current POS & Tools',field:'Current POS System'});
  if(!data.hardware.networking)missing.push({section:'🔧 Hardware & Networking',field:'Networking Assistance Needed'});
  if(!data.timeline.goLive)missing.push({section:'📅 Timeline & Planning',field:'Go-Live Target Date'});
  if(!data.notes.attentionGSO)missing.push({section:'📝 Notes & Special Instructions',field:'Attention Items for GSO'});
  return missing;
}

function sendSlack(isIncomplete){
  var slackContent = document.querySelector('.slack-content');
  if(!slackContent) { closeModal(); return; }

  var slackMsg = buildSlackBlocks(isIncomplete);
  var hasBot = CONFIG.SLACK_ENABLED && CONFIG.SLACK_BOT_TOKEN;
  var hasWebhook = CONFIG.SLACK_ENABLED && CONFIG.SLACK_WEBHOOK_URL;
  var hasProxy = !!CONFIG.API_PROXY_URL;

  if((hasBot || hasWebhook) && hasProxy){
    // ===== REAL Slack via Proxy =====
    var mbody = document.getElementById('modalBody');
    var mfooter = document.getElementById('modalFooter');
    mbody.innerHTML='<div style="text-align:center;padding:40px"><div class="spinner" style="border-color:rgba(0,106,255,.2);border-top-color:var(--blue);width:40px;height:40px;margin:0 auto 16px"></div><div style="color:var(--gray-500)">Sending to '+esc(CONFIG.SLACK_CHANNEL)+'...</div></div>';
    mfooter.innerHTML='';

    var proxyPayload;
    if(hasBot){
      proxyPayload = {
        action: 'slack_bot',
        token: CONFIG.SLACK_BOT_TOKEN,
        channel: CONFIG.SLACK_CHANNEL,
        text: slackMsg.text,
        blocks: slackMsg.blocks
      };
    } else {
      proxyPayload = {
        action: 'slack_webhook',
        webhook_url: CONFIG.SLACK_WEBHOOK_URL,
        payload: slackMsg
      };
    }

    fetch(CONFIG.API_PROXY_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(proxyPayload)
    }).then(function(resp){ return resp.json(); })
    .then(function(json){
      if(json.ok){
        closeModal();
        showToast(isIncomplete ? '📤 Alert sent to '+CONFIG.SLACK_CHANNEL+' — missing fields flagged' : '✅ Complete discovery sent to '+CONFIG.SLACK_CHANNEL, 'success');
      } else {
        var errMsg = json.error || 'Unknown error';
        var hint = '';
        if(errMsg === 'not_in_channel') hint = 'Invite the bot to '+CONFIG.SLACK_CHANNEL+' first, or add chat:write.public scope.';
        else if(errMsg === 'channel_not_found') hint = 'Channel not found. Try using the channel ID (starts with C).';
        else if(errMsg === 'invalid_auth') hint = 'Bot token is invalid. Check it in ⚙️ Settings.';
        mbody.innerHTML='<div style="color:var(--red);padding:20px;text-align:center"><strong>❌ Slack Error: '+esc(errMsg)+'</strong>'+(hint?'<br><br><span style="font-size:12px;color:var(--gray-500)">'+esc(hint)+'</span>':'')+'</div>';
        mfooter.innerHTML='<button class="btn" onclick="closeModal()">Close</button><button class="btn" onclick="copySlackText()">📋 Copy Instead</button><button class="btn" onclick="openSettings()">⚙️ Settings</button>';
      }
    }).catch(function(err){
      mbody.innerHTML='<div style="color:var(--red);padding:20px;text-align:center"><strong>❌ Proxy Error</strong><br><br>'+esc(err.message)+'<br><br><span style="font-size:12px;color:var(--gray-500)">Check your API Proxy URL in ⚙️ Settings</span></div>';
      mfooter.innerHTML='<button class="btn" onclick="closeModal()">Close</button><button class="btn" onclick="copySlackText()">📋 Copy Instead</button>';
    });

  } else if(CONFIG.SLACK_ENABLED && !hasProxy){
    // No proxy — copy and warn
    closeModal();
    var text = slackContent.innerText;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        showToast('📋 Copied! Set up API Proxy in ⚙️ Settings for auto-send to Slack','info');
      }).catch(function(){ fallbackCopy(text); });
    } else { fallbackCopy(text); }

  } else {
    // ===== No integration configured — copy to clipboard =====
    closeModal();
    var text = slackContent.innerText;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        showToast('📋 Copied to clipboard — configure Slack in ⚙️ for auto-send','info');
      }).catch(function(){ fallbackCopy(text); });
    } else { fallbackCopy(text); }
  }
}

function buildSlackBlocks(isIncomplete){
  var emoji = isIncomplete ? ':red_circle:' : ':white_check_mark:';
  var status = isIncomplete ? 'INCOMPLETE DISCOVERY' : 'COMPLETE DISCOVERY';
  var text = emoji+' *'+status+' — '+esc(data.business.name||'Unknown Business')+'*\n';
  text += '*AE:* '+esc(data.aeName||'N/A')+' | *Date:* '+esc(data.aeDate||'N/A')+'\n';
  text += '*Locations:* '+(data.business.locations||0)+' | *Type:* '+esc(data.business.type||'N/A')+'\n\n';

  if(isIncomplete){
    var missing = getMissingRequired();
    text += ':no_entry: *Missing Required Fields:*\n';
    var sectionGroups={};
    missing.forEach(function(m){
      if(!sectionGroups[m.section])sectionGroups[m.section]=[];
      sectionGroups[m.section].push(m.field);
    });
    Object.keys(sectionGroups).forEach(function(sec){
      text += '• *'+sec+':* '+sectionGroups[sec].join(', ')+'\n';
    });
    text += '\n:warning: _Action needed: Follow up with AE to complete discovery._\n';
  } else {
    text += '*Current POS:* '+esc(data.current.pos||'N/A')+'\n';
    text += '*Square Product:* '+(data.technical.products||[]).join(', ')+' | '+esc(data.technical.tier||'')+'\n';
    text += '*Go-Live:* '+esc(data.timeline.goLive||'TBD')+'\n';
    text += '*Decision Maker:* '+esc(data.goals.decisionMaker.name||'N/A')+' ('+esc(data.goals.decisionMaker.role||'')+')'+'\n';
    text += '*Day-to-Day Contact:* '+esc(data.goals.stakeholder.name||'N/A')+' ('+esc(data.goals.stakeholder.role||'')+')'+'\n';
    var totals=calcHardwareTotals();
    var hwItems=[];
    Object.keys(totals).forEach(function(k){if(totals[k]>0)hwItems.push(k+': '+totals[k]);});
    if(hwItems.length>0) text += '*Hardware:* '+hwItems.join(' | ')+'\n';
  }

  if(data.notes.attentionGSO){
    text += '\n:rotating_light: *ATTENTION ITEMS FOR GSO:*\n'+data.notes.attentionGSO+'\n';
  }
  if(data.timeline.gsoInstructions){
    text += '\n:warning: *GSO INSTRUCTIONS:*\n'+data.timeline.gsoInstructions+'\n';
  }

  return {
    text: text,
    blocks: [
      { type:'section', text:{ type:'mrkdwn', text:text } }
    ]
  };
}

function copySlackText(){
  var preview=document.querySelector('.slack-content');
  if(preview){
    var text=preview.innerText;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        showToast('📋 Copied to clipboard','success');
      }).catch(function(){
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');showToast('📋 Copied to clipboard','success');}catch(e){showToast('Failed to copy','error');}
  document.body.removeChild(ta);
}

// MODAL
function openModal(){document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

// TOAST
function showToast(msg,type){
  type=type||'info';
  var c=document.getElementById('toastContainer');
  var t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3000);
}

// INIT
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('aeDate').value=data.aeDate;
  loadFromStorage();
  renderSidebar();
  renderContent();
  startAutoSave();
  updateSFStatus();
  document.getElementById('modalOverlay').addEventListener('click',function(e){
    if(e.target===document.getElementById('modalOverlay'))closeModal();
  });
});
</script>
</body>
